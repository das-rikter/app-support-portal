services:
  postgres:
    image: postgres:16-alpine
    container_name: app-support-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: app_support_portal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d app_support_portal"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
